services:
  armory:
    build: .
    container_name: armory
    ports:
      - "${ARMORY_HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    volumes:
      # Persist SQLite database
      - armory_data:/app/data
      # Persist uploaded photos and documents
      - armory_uploads:/app/uploads
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  armory_data:
    driver: local
  armory_uploads:
    driver: local
