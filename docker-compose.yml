services:
  armory:
    build: .
    container_name: armory
    ports:
      - "3000:3000"
    environment:
      # CHANGE THESE before deploying
      - SESSION_SECRET=replace-with-a-long-random-string-at-least-32-chars
      - DEFAULT_USER=admin
      - DEFAULT_PASS=armory123
      - PORT=3000
    volumes:
      # Persist SQLite database
      - armory_data:/app/data
      # Persist uploaded photos and documents
      - armory_uploads:/app/uploads
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  armory_data:
    driver: local
  armory_uploads:
    driver: local
