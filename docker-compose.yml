services:
  armory:
    build: .
    container_name: armory
    ports:
      - "${ARMORY_HOST_PORT:-3000}:3000"
    environment:
      # SESSION_SECRET: set this to a strong random value before deploying.
      # Generate one with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # If unset or left as the placeholder, a startup warning is printed and sessions
      # will either be ephemeral (unset) or potentially forgeable (known placeholder).
      - SESSION_SECRET=replace-with-a-long-random-string-at-least-32-chars
      # DEFAULT_USER / DEFAULT_PASS: credentials for the initial admin account.
      # If DEFAULT_PASS is unset, a random password is generated and printed to the
      # container logs on first run — check with: docker logs armory
      - DEFAULT_USER=admin
      - DEFAULT_PASS=armory123
      - PORT=3000
    volumes:
      # Persist SQLite database
      - armory_data:/app/data
      # Persist uploaded photos and documents
      - armory_uploads:/app/uploads
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  armory_data:
    driver: local
  armory_uploads:
    driver: local
